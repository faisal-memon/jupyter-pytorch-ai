name: Update Base Image

on:
  schedule:
    - cron: "23 14 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: update-base-image
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Find latest upstream tag
        id: latest
        uses: actions/github-script@v7
        with:
          script: |
            const response = await fetch("https://quay.io/api/v1/repository/jupyter/pytorch-notebook/tag/?onlyActiveTags=true&limit=100");
            if (!response.ok) {
              core.setFailed(`Failed to query Quay: ${response.status} ${response.statusText}`);
              return;
            }

            const payload = await response.json();
            const tags = (payload.tags || [])
              .map((tag) => tag.name)
              .filter((tag) => /^\d{4}-\d{2}-\d{2}$/.test(tag))
              .sort()
              .reverse();

            if (tags.length === 0) {
              core.setFailed("No dated upstream tags were found.");
              return;
            }

            core.setOutput("tag", tags[0]);

      - name: Read current base tag
        id: current
        run: |
          echo "tag=$(cat BASE_TAG)" >> "$GITHUB_OUTPUT"

      - name: Stop if already current
        if: steps.current.outputs.tag == steps.latest.outputs.tag
        run: echo "Base image is already current."

      - name: Update pinned base tag
        if: steps.current.outputs.tag != steps.latest.outputs.tag
        run: |
          printf '%s\n' '${{ steps.latest.outputs.tag }}' > BASE_TAG
          sed -i "s/^ARG BASE_TAG=.*/ARG BASE_TAG=${{ steps.latest.outputs.tag }}/" Dockerfile
          sed -i "s|quay.io/jupyter/pytorch-notebook:[0-9]\\{4\\}-[0-9]\\{2\\}-[0-9]\\{2\\}|quay.io/jupyter/pytorch-notebook:${{ steps.latest.outputs.tag }}|" README.md

      - name: Create pull request
        if: steps.current.outputs.tag != steps.latest.outputs.tag
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.PR_WORKFLOW_TOKEN }}
          branch: chore/update-base-image-${{ steps.latest.outputs.tag }}
          commit-message: "chore: update base image to ${{ steps.latest.outputs.tag }}"
          title: "chore: update base image to ${{ steps.latest.outputs.tag }}"
          body: |
            Updates the pinned upstream Jupyter base image.

            - Previous tag: `${{ steps.current.outputs.tag }}`
            - New tag: `${{ steps.latest.outputs.tag }}`

            This PR was created automatically after detecting a newer dated tag on Quay.
          delete-branch: true
